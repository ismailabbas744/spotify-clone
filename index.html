<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spotify - Web Player: Music for everyone</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/utility.css">
    <link rel="icon" href="favicon.ico">

</head>

<body>
    <header class="flex">
        <div class="header-left flex">
            <div class="logo"><img class="invert" src="images/logo.svg" alt="logo"></div>
            <div class="home-logo"><img class="invert" src="images/home.svg" alt="home"></div>
            <div class="search flex">
                <img class="invert-1" src="images/search.svg" alt="search">
                <input type="text" placeholder="What do you want to play?">
            </div>
        </div>
        <div class="header-right">
            <ul class="flex">
                <div class="customer-support flex">
                    <li>Premium</li>
                    <li>Support</li>
                    <li>Download </li>
                </div>

                <div class="basics flex">

                    <li class="flex download"><img class="invert-1" src="images/download.svg" alt="download" width="16">Install
                        App</li>
                    <li>Sign Up</li>
                    <li><button class="btn">Log in </button></li>
                </div>
            </ul>
        </div>

    </header>

    <main class="flex">
        <div class="left">
            <div class="close">
                <img src="images/close.svg" alt="close" width="25">
            </div>
            <div class="library">
                <div class="lib-heading flex">
                    <h2>Your Library</h2>
                    <img class="invert-1" src="images/add.svg" alt="add" width="16">
                </div>


                <div class="songs">
                    <ul class="songsList">
                        <!-- <li>
                            <div class="image">
                                <img src="music.svg" alt="music">
                            </div>
                            <div class="songName">hello  - the  - song</div>
                            <div class="play">
                                <img src="play.svg" alt="play">
                            </div>
                        </li> -->

                    </ul>
                </div>

            </div>
            <div class="left-footer">
                <ul>
                    <li><a href="">Legal</a></li>
                    <li><a href="">Safety&PrivacyCenter</a></li>
                    <li><a href="">PrivacyPolicy</a></li>
                    <li><a href="">Cookies</a></li>
                    <li><a href="">AboutAds</a></li>
                    <li><a href="">Accessibility</a></li>
                </ul>
            </div>
        </div>
        <div class="right">
            <h1>Playlists</h1>
            <div class="hamburger invert">
                <img src="images/hamburger.svg" alt="hamburger" width="25">
            </div>
            <div class="cardsContainer">
                <!-- <div data-folder="" class="card">
                    <img src="pic1.jpeg" alt="songs pic">
                    <h2>Thodi si Daaru</h2>
                    <div>AP Dhillon, Shreya Ghoshal</div>
                    <div class="play-btn">
                        <img src="play-green.svg" alt="play" width="60">
                    </div>
                </div> -->






                































            </div>
            <div class="play-bar">
                <div class="song-info">
                    <div class="songTitle">kia koi hia jo kisi se </div>
                    <div class="play-icons invert">
                        <div id="previous"><img src="images/previous.svg" alt="previous" width="23">
                        </div>
                        <div id="play">
                            <img src="images/play1.svg" alt="play" width="23">
                        </div>
                        <div id="next">
                            <img src="images/next.svg" alt="next" width="23">
                        </div>
                    </div>
                    <div class="songDuration">
                        <div class="songTime">00:12/22:22</div>
                        <div class="vol">
                            <img class="invert" src="images/volume.svg" alt="volume" width="20">
                            <input type="range" value="100">
                        </div>
                    </div>

                </div>
                <div class="seekbar">

                </div>
                <div class="circle"></div>
            </div>
        </div>
    </main>

    <script src="js/script.js"></script>

</body>

</html>
